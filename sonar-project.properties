# SonarQube Project Configuration
sonar.projectKey=mushroom-shop
sonar.projectName=Sporekart - Mushroom E-Commerce Platform
sonar.projectVersion=1.0.0

# Source code directories
sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.test.js

# Test files
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js,**/tests/**/*.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# JavaScript/TypeScript specific
sonar.javascript.file.suffixes=.js,.jsx

# Coverage
sonar.dynamicAnalysis=reuseReports

# Code analysis settings
sonar.sourceEncoding=UTF-8
sonar.language=js

# Duplicate detection
sonar.cpd.exclusions=**/node_modules/**

# Host settings (for local SonarQube server)
# sonar.host.url=http://localhost:9000
# sonar.login=your-token-here
