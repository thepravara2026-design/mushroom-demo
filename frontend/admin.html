<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Sporekart Admin…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a1410;
      color: #e8f5ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(56,177,123,0.15);
      border-top-color: #38b17b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(148,163,184,0.8); font-size: 1rem; }
    a { color: #38b17b; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Redirecting to admin panel…</p>
  <p><a href="/#admin">Click here</a> if not redirected automatically.</p>
  <script>
    var hash = location.hash || '';
    window.location.replace('/#' + (hash ? 'admin' + hash : 'admin'));
  </script>
</body>
</html>
